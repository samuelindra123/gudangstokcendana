name: Build Windows Desktop Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        default: ''

jobs:
  build:
    name: Build Windows Desktop
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: desktop/package-lock.json

    - name: Install desktop dependencies
      working-directory: ./desktop
      run: npm install

    - name: Build desktop application
      working-directory: ./desktop
      run: npm run dist:win
      env:
        NODE_ENV: production
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: desktop/dist/*.exe
        retention-days: 30

    - name: Get version
      id: version
      run: |
        $version = (Get-Content desktop/package.json | ConvertFrom-Json).version
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "tag=v$version" >> $env:GITHUB_OUTPUT

    - name: Create Release
      uses: ncipollo/release-action@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        artifacts: "desktop/dist/*.exe"
        draft: false
        prerelease: false
        generateReleaseNotes: true
        artifactErrorsFailBuild: true
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish artifacts to workflow
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: release-binaries
        path: desktop/dist/*.exe

  test-installer:
    name: Test Windows Installer
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download installer
      uses: actions/download-artifact@v4
      with:
        name: release-binaries
        path: ./installers

    - name: Run installer (silent mode)
      shell: pwsh
      run: |
        Get-ChildItem ./installers -Filter "*.exe" | ForEach-Object {
          Write-Host "Testing installer: $($_.Name)"
          # Note: In CI, we can't fully test GUI installation, 
          # but we can verify file integrity
          $installerPath = $_.FullName
          if (Test-Path $installerPath) {
            Write-Host "✓ Installer file is valid"
          } else {
            throw "Installer not found"
          }
        }

    - name: Verify digital signature (optional)
      shell: pwsh
      run: |
        Get-ChildItem ./installers -Filter "*.exe" | ForEach-Object {
          Write-Host "Verifying: $($_.Name)"
          $file = Get-Item $_.FullName
          Write-Host "File size: $($file.Length) bytes"
        }
