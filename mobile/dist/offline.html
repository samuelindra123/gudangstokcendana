<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gudang Stok Cendana - Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: white; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div class="p-8 pb-10 flex flex-col items-center bg-zinc-900 rounded-2xl shadow-2xl shadow-blue-900/10 border border-zinc-800 text-center max-w-sm mx-4">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="w-20 h-20 mb-6 drop-shadow-md">
          <rect width="100" height="100" rx="20" fill="#3b82f6" />
          <text x="50" y="65" font-family="sans-serif" font-size="50" font-weight="bold" fill="white" text-anchor="middle">GC</text>
        </svg>

        <h2 class="text-xl font-bold mb-2 text-zinc-100">Koneksi Terputus</h2>
        <p class="text-zinc-400 text-sm mb-6 leading-relaxed">Aplikasi memerlukan jaringan internet untuk mengakses data Gudang Cendana. Silakan periksa koneksi Anda.</p>
        
        <button onclick="window.location.reload()" class="w-full bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-600/20 font-medium py-3 px-6 rounded-lg transition-all active:scale-95 flex justify-center items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rotate-cw"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            Coba Lagi
        </button>
    </div>
